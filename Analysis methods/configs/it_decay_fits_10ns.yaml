# Integrated-time trace decay fitting settings.
out_subdir: "it_decay_fits_10ns"
trace_config_dir: "it_decay_fits_10ns"
time_window: "10ns"
fit_all_discovered_traces: true
smooth_sigma: 2.0
min_points: 30
min_fit_points: 25
peak_height_fraction: 0.20
peak_prominence_fraction: 0.12
noise_sigma_threshold: 3.0
low_signal_sigma_threshold: 5.0
fit_tau_min_ns: 0.03
fit_tau_max_ns: 50.0
